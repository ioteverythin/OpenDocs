name: Publish to PyPI

on:
  push:
    tags:
      - "v*.*.*"   # triggers on v0.9.0, v1.0.0, etc.

permissions:
  contents: write   # needed to create GitHub Release
  id-token: write   # needed for PyPI trusted publishing (OIDC)

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest

    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install build tools
        run: pip install build

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build wheel and sdist
        run: python -m build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish-pypi:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/opendocs/${{ needs.build.outputs.version }}/

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        # Uses OIDC trusted publishing — no API token needed.
        # Configure at: https://pypi.org/manage/project/opendocs/settings/publishing/
        # Publisher: GitHub Actions  owner: ioteverythin  repo: OpenDocs
        #            workflow: publish.yml  environment: pypi

  release:
    name: Create GitHub Release
    needs: [build, publish-pypi]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history for changelog extraction

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Extract changelog section for this version
        id: changelog
        run: |
          VERSION="${{ needs.build.outputs.version }}"
          # Extract the block between ## [VERSION] and the next ## heading
          NOTES=$(awk "/^## \[?${VERSION}\]?|^## v?${VERSION}/"',/^## /{if(found) exit; found=1; next} found{print}' CHANGELOG.md 2>/dev/null || echo "")
          if [ -z "$NOTES" ]; then
            NOTES="See [CHANGELOG.md](https://github.com/ioteverythin/OpenDocs/blob/main/CHANGELOG.md) for details."
          fi
          # Write to file to avoid quoting issues
          echo "$NOTES" > release_notes.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "OpenDocs ${{ github.ref_name }}"
          body_path: release_notes.txt
          files: dist/*
          draft: false
          prerelease: ${{ contains(github.ref_name, 'a') || contains(github.ref_name, 'b') || contains(github.ref_name, 'rc') }}
